<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <h3>Pomodoro by Xiao Tong</h3>
    <div class="timer-card">
      <div class="session-label" id="sessionLabel">Work Session</div>
      <div class="timer-ring">
        <svg viewBox="0 0 220 220" aria-hidden="true">
          <circle class="progress-ring__bg" cx="110" cy="110" r="100" />
          <circle class="progress-ring__circle" cx="110" cy="110" r="100" />
        </svg>
        <div class="timer-display" id="timerDisplay">25:00</div>
      </div>
      <div class="controls">
        <button id="startButton" type="button">Start</button>
        <button id="pauseButton" type="button" disabled>Pause</button>
        <button id="resumeButton" type="button" disabled>Resume</button>
        <button id="resetButton" type="button">Reset</button>
      </div>
      <div class="session-count">Sessions completed: <span id="sessionCount">0</span></div>
    </div>
  </main>
  <audio id="sessionSound" hidden></audio>
  <script src="app.js"></script>
</body>
</html>
